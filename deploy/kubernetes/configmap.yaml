apiVersion: v1
kind: ConfigMap
metadata:
  name: arc-gateway-config
  namespace: arc-gateway
data:
  arc.toml: |
    listen = "0.0.0.0:8080"
    admin_listen = "0.0.0.0:9090"
    workers = 1
    require_upstream_mtls = false
    plugins = []

    [control_plane]
    enabled = true
    auth_token = "__ARC_TOKEN__"

    [io_uring]
    entries = 256
    accept_multishot = false
    tick_ms = 10
    sqpoll = false
    sqpoll_idle_ms = 0
    iopoll = false

    [buffers]
    buf_size = 16384
    buf_count = 256

    [timeouts_ms]
    cli_read = 30000
    up_conn = 3000
    up_write = 10000
    up_read = 10000
    cli_write = 30000

    [[upstreams]]
    name = "backend"
    addr = "127.0.0.1:18080"
    keepalive = 64
    idle_ttl_ms = 30000

    [[routes]]
    path = "/"
    upstream = "backend"

    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_REAL_CERT
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_REAL_KEY
    -----END PRIVATE KEY-----

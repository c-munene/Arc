apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: arc-gateway
  namespace: arc-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: arc-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

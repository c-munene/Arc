apiVersion: v1
kind: Service
metadata:
  name: arc-gateway
  namespace: arc-gateway
spec:
  type: ClusterIP
  selector:
    app: arc-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: https
      port: 8443
      targetPort: 8443
    - name: admin
      port: 9090
      targetPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: arc-gateway-nodeport
  namespace: arc-gateway
spec:
  type: NodePort
  selector:
    app: arc-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30080
    - name: https
      port: 443
      targetPort: 8443
      nodePort: 30443
